<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Anime List</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        <div class="controls">
    <input type="text" id="anime-search" placeholder="Search anime (e.g. Naruto)...">
    <select id="status-select">
        <option value="Plan to Watch">Plan to Watch</option>
        <option value="Watching">Watching</option>
        <option value="Watched">Completed</option>
        <option value="Unfinished">On Hold/Unfinished</option>
    </select>
    <button onclick="addAnime()">Add to List</button>
        </div>
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card {
    background: rgba(255, 255, 255, 0.05); /* See-through dark grey */
    backdrop-filter: blur(10px);          /* Blurs the background */
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: transform 0.2s;           /* Makes it "pop" on hover */
}

        .card:hover {
    transform: translateY(-5px);          /* Lifts the card up */
}
        .card img { max-width: 100%; border-radius: 4px; height: 280px; object-fit: cover; }
        h1 { border-bottom: 2px solid #3eaf7c; padding-bottom: 10px; }
        .controls {
    margin-bottom: 30px;
    display: flex;
    gap: 10px;
    background: #2a2a2a;
    padding: 20px;
    border-radius: 12px;
}

input, select, button {
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1a1a1a;
    color: white;
}

button {
    background: #3eaf7c;
    cursor: pointer;
    font-weight: bold;
}

button:hover { background: #4ecb8f; }
    </style>
</head>
<body>

    <h1>📺 My Anime Collection</h1>
    <div id="anime-grid" class="grid">Loading your list...</div>

    <script>
    async function addAnime() {
    const searchTerm = document.getElementById('anime-search').value;
    const status = document.getElementById('status-select').value;
    const btn = document.querySelector('button');

    if (!searchTerm) return alert("Please enter a name!");

    btn.innerText = "Adding...";
    btn.disabled = true;

    try {
        // This calls your Supabase Edge Function directly!
        const response = await fetch('https://lbnkiixympbtjkgyrygr.supabase.co/functions/v1/add-anime', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer [YOUR_PUBLIC_ANON_KEY]'
            },
            body: JSON.stringify({ searchTerm, status })
        });

        if (response.ok) {
            alert("Added successfully!");
            location.reload(); // Refresh to see the new card
        } else {
            const err = await response.json();
            throw new Error(err.error);
        }
    } catch (err) {
        alert("Error: " + err.message);
    } finally {
        btn.innerText = "Add to List";
        btn.disabled = false;
    }
}
        // 1. Setup Connection (Use your URL and the PUBLIC 'anon' key here)
        const _supabase = supabase.createClient('https://lbnkiixympbtjkgyrygr.supabase.co', 'sb_publishable_gpco_Svssi5SOGxAnimdsg_B3h7Sfv6');

        async function loadAnime() {
            const { data, error } = await _supabase
                .from('anime')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            const container = document.getElementById('anime-grid');
            container.innerHTML = data.map(item => `
                <div class="card">
                    <img src="${item.cover_image_url || 'https://via.placeholder.com/200x280'}" alt="${item.title}">
                    <h3>${item.title}</h3>
                    <p style="color: #aaa;">${item.status}</p>
                </div>
            `).join('');
        }

        loadAnime();
    </script>
</body>
</html>
